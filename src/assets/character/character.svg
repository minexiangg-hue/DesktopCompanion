<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" data-emotion="happy" class="character-root">
  <defs>
    <!-- Body volumetric gradient: cream top, warm shadow bottom -->
    <radialGradient id="bodyGrad" cx="50%" cy="35%" r="68%" fx="50%" fy="30%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#FFFDF7"/>
      <stop offset="70%"  stop-color="#FFF8F0"/>
      <stop offset="92%"  stop-color="#F5EDE0"/>
      <stop offset="100%" stop-color="#F0E8DC"/>
    </radialGradient>

    <!-- Iris gradient for depth -->
    <radialGradient id="irisGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#7A5C40"/>
      <stop offset="60%"  stop-color="#5C4033"/>
      <stop offset="100%" stop-color="#3D2A1F"/>
    </radialGradient>

    <!-- Happy iris gradient (golden brown) -->
    <radialGradient id="irisHappyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#C49A30"/>
      <stop offset="60%"  stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F0E"/>
    </radialGradient>

    <!-- Sad iris gradient (gray-blue) -->
    <radialGradient id="irisSadGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#718096"/>
      <stop offset="60%"  stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#2D3748"/>
    </radialGradient>

    <!-- Sleepy iris gradient (gray) -->
    <radialGradient id="irisSleepyGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#A0AEC0"/>
      <stop offset="60%"  stop-color="#888888"/>
      <stop offset="100%" stop-color="#666666"/>
    </radialGradient>

    <!-- Panic iris gradient (dark, small) -->
    <radialGradient id="irisPanicGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#555555"/>
      <stop offset="60%"  stop-color="#333333"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </radialGradient>

    <!-- Eye clip path for clean edges -->
    <clipPath id="eyeClipL">
      <ellipse cx="70" cy="85" rx="26" ry="28"/>
    </clipPath>
    <clipPath id="eyeClipR">
      <ellipse cx="130" cy="85" rx="26" ry="28"/>
    </clipPath>
  </defs>

  <!-- ==================== STYLES ==================== -->
  <style>
    /* --- Emotion: Default (Happy) --- */
    [data-emotion="happy"] .mouth-happy   { opacity: 1; }
    [data-emotion="happy"] .blush         { opacity: 0.4; fill: #FFB5B5; }
    [data-emotion="happy"] .iris          { fill: url(#irisHappyGrad); transform: scale(1); }
    [data-emotion="happy"] .iris-group    { transform: translate(0, 2px); }

    /* --- Emotion: Sad --- */
    [data-emotion="sad"] .mouth-sad       { opacity: 1; }
    [data-emotion="sad"] .blush           { opacity: 0; }
    [data-emotion="sad"] .iris            { fill: url(#irisSadGrad); }
    [data-emotion="sad"] .iris-group      { transform: translate(0, 4px) scale(0.95); }
    [data-emotion="sad"] .eye-white       { transform: rotate(4deg); }
    [data-emotion="sad"] .eye-white-r     { transform: rotate(-4deg); }
    [data-emotion="sad"] .mouth-pos       { transform: translate(0, 4px); }
    [data-emotion="sad"] .eyebrow-l       { transform: translate(0, 4px) rotate(-8deg); }
    [data-emotion="sad"] .eyebrow-r       { transform: translate(0, 4px) rotate(8deg); }

    /* --- Emotion: Surprised --- */
    [data-emotion="surprised"] .mouth-surprised { opacity: 1; }
    [data-emotion="surprised"] .blush     { opacity: 0; }
    [data-emotion="surprised"] .iris      { fill: #1A1A1A; }
    [data-emotion="surprised"] .iris-group { transform: translate(0, 2px) scale(1.25); }
    [data-emotion="surprised"] .highlight-sub { opacity: 0; }
    [data-emotion="surprised"] .eyebrow-l { transform: translate(0, -4px) rotate(0deg); }
    [data-emotion="surprised"] .eyebrow-r { transform: translate(0, -4px) rotate(0deg); }

    /* --- Emotion: Sleepy --- */
    [data-emotion="sleepy"] .mouth-sleepy { opacity: 1; }
    [data-emotion="sleepy"] .blush        { opacity: 0.2; fill: #FFB5B5; }
    [data-emotion="sleepy"] .iris         { fill: url(#irisSleepyGrad); }
    [data-emotion="sleepy"] .iris-group   { transform: translate(0, 2px) scale(0.9); }
    [data-emotion="sleepy"] .eyelid-l     { transform: translate(0, -12px); }
    [data-emotion="sleepy"] .eyelid-r     { transform: translate(0, -12px); }
    [data-emotion="sleepy"] .eyebrow-l    { transform: translate(0, -4px) rotate(0deg); }
    [data-emotion="sleepy"] .eyebrow-r    { transform: translate(0, -4px) rotate(0deg); }

    /* --- Emotion: Tsundere --- */
    [data-emotion="tsundere"] .mouth-tsundere { opacity: 1; }
    [data-emotion="tsundere"] .blush       { opacity: 0.55; fill: #FF6B9D; }
    [data-emotion="tsundere"] .iris        { fill: url(#irisGrad); }
    [data-emotion="tsundere"] .eye-pos-left  { transform: translate(62px, 85px); }
    [data-emotion="tsundere"] .eye-pos-right { transform: translate(138px, 85px); }
    [data-emotion="tsundere"] .eyebrow-l   { transform: translate(0, -2px) rotate(10deg); }
    [data-emotion="tsundere"] .eyebrow-r   { transform: translate(0, -2px) rotate(-10deg); }

    /* --- Emotion: Panic --- */
    [data-emotion="panic"] .mouth-panic    { opacity: 1; }
    [data-emotion="panic"] .blush          { opacity: 0; }
    [data-emotion="panic"] .iris           { fill: url(#irisPanicGrad); }
    [data-emotion="panic"] .iris-group     { transform: translate(0, 2px) scale(0.4); }
    [data-emotion="panic"] .sweat-drop     { opacity: 1; }
    [data-emotion="panic"] .eyebrow-l      { transform: translate(0, -6px) rotate(15deg); }
    [data-emotion="panic"] .eyebrow-r      { transform: translate(0, -6px) rotate(-15deg); }

    /* --- Emotion: Deadpan --- */
    [data-emotion="deadpan"] .mouth-deadpan { opacity: 1; }
    [data-emotion="deadpan"] .blush         { opacity: 0; }
    [data-emotion="deadpan"] .eye-white     { opacity: 0; }
    [data-emotion="deadpan"] .eye-white-r   { opacity: 0; }
    [data-emotion="deadpan"] .iris-group    { opacity: 0; }
    [data-emotion="deadpan"] .eye-line-l    { opacity: 1; }
    [data-emotion="deadpan"] .eye-line-r    { opacity: 1; }
    [data-emotion="deadpan"] .eyebrow-l     { transform: translate(0, -2px) rotate(0deg); }
    [data-emotion="deadpan"] .eyebrow-r     { transform: translate(0, -2px) rotate(0deg); }

    /* Default eye positioning (CSS-based for compatibility with emotion overrides) */
    .eye-pos-left  { transform: translate(70px, 85px); }
    .eye-pos-right { transform: translate(130px, 85px); }

    /* Default mouth positioning at center of face */
    .mouth-pos     { transform: translate(100px, 115px); }

    /* Base eye styles */
    .eye-white     { fill: #FEFEFE; transition: transform 0.3s ease, opacity 0.2s ease; }
    .eye-white-r   { fill: #FEFEFE; transition: transform 0.3s ease, opacity 0.2s ease; }
    .iris-group    { transition: transform 0.3s ease, opacity 0.2s ease; }
    .iris          { transition: fill 0.3s ease; }
    .eyelid-l,
    .eyelid-r      { transition: transform 0.4s ease; }

    /* Eye line for deadpan */
    .eye-line-l,
    .eye-line-r    { transition: opacity 0.2s ease; }

    /* Mouth base styles */
    .mouth         { transition: transform 0.3s ease; }
    .mouth path,
    .mouth ellipse,
    .mouth line    { transition: opacity 0.25s ease; }

    /* Blush transition */
    .blush         { transition: opacity 0.4s ease, fill 0.4s ease; }

    /* Eyebrows */
    .eyebrow-l,
    .eyebrow-r     { transition: transform 0.3s ease; }

    /* Effects */
    .sweat-drop    { transition: opacity 0.3s ease; }
    .effect-zzz    { transition: opacity 0.5s ease; }

    /* Interactive hover states */
    .character-root:hover [data-emotion="happy"] .blush { opacity: 0.55; }
  </style>

  <!-- ==================== GROUND SHADOW ==================== -->
  <ellipse cx="100" cy="236" rx="76" ry="7" fill="#000000" opacity="0.07"/>

  <!-- ==================== EFFECTS (BEHIND) ==================== -->
  <g id="effects" class="effects-bg">
    <!-- ZZZ characters for sleeping -->
    <g class="effect-zzz" opacity="0">
      <text class="zzz-1" x="162" y="44" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="900" fill="#A0D8EF" opacity="0.9">Z</text>
      <text class="zzz-2" x="170" y="30" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="900" fill="#A0D8EF" opacity="0.6">Z</text>
      <text class="zzz-3" x="176" y="18" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="900" fill="#A0D8EF" opacity="0.35">Z</text>
    </g>
  </g>

  <!-- ==================== ARMS (BEHIND BODY) ==================== -->
  <g id="arms">
    <!-- Left arm -->
    <ellipse class="arm-left" cx="24" cy="172" rx="11" ry="16" fill="#FFF8F0" stroke="#F0E8DC" stroke-width="1.2" transform="rotate(-12, 24, 172)"/>
    <!-- Right arm -->
    <ellipse class="arm-right" cx="176" cy="172" rx="11" ry="16" fill="#FFF8F0" stroke="#F0E8DC" stroke-width="1.2" transform="rotate(12, 176, 172)"/>
  </g>

  <!-- ==================== BODY ==================== -->
  <g id="body">
    <!-- Main body shape (potato/egg silhouette with subtle feet bumps) -->
    <path class="character-body"
          d="M 100 28
             C 48 28, 26 56, 26 100
             C 26 142, 32 168, 32 190
             C 32 210, 26 222, 32 228
             C 38 235, 50 237, 58 232
             C 64 228, 74 225, 84 225
             C 92 225, 96 228, 100 228
             C 104 228, 108 225, 116 225
             C 126 225, 136 228, 142 232
             C 150 237, 162 235, 168 228
             C 174 222, 168 210, 168 190
             C 168 168, 174 142, 174 100
             C 174 56, 152 28, 100 28 Z"
          fill="url(#bodyGrad)"/>

    <!-- Soft bottom shadow volume -->
    <path d="M 32 190
             C 32 215, 55 228, 100 228
             C 145 228, 168 215, 168 190
             C 168 205, 145 218, 100 218
             C 55 218, 32 205, 32 190 Z"
          fill="#F0E8DC" opacity="0.35"/>

    <!-- Body edge rim light (subtle) -->
    <path d="M 26 100
             C 26 56, 48 28, 100 28
             C 152 28, 174 56, 174 100"
          fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- ==================== EYEBROWS ==================== -->
  <g id="eyebrows">
    <path class="eyebrow-l" d="M 48 62 Q 58 56 68 62" fill="none" stroke="#D4C5A9" stroke-width="2.5" stroke-linecap="round"/>
    <path class="eyebrow-r" d="M 132 62 Q 142 56 152 62" fill="none" stroke="#D4C5A9" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ==================== BLUSH ==================== -->
  <g id="blush">
    <ellipse class="blush blush-l" cx="45" cy="105" rx="16" ry="9" fill="#FFB5B5" opacity="0.4"/>
    <ellipse class="blush blush-r" cx="155" cy="105" rx="16" ry="9" fill="#FFB5B5" opacity="0.4"/>
  </g>

  <!-- ==================== EYES ==================== -->
  <g id="eyes">
    <!-- ====== LEFT EYE ====== -->
    <g class="eye-pos-left">
      <g class="eye-left">
        <!-- Eye white -->
        <ellipse class="eye-white" cx="0" cy="0" rx="26" ry="28" fill="#FEFEFE"/>

        <!-- Iris + Highlights group -->
        <g class="iris-group" transform="translate(0, 2)">
          <circle class="iris" cx="0" cy="0" r="20" fill="url(#irisGrad)"/>
          <!-- Main highlight (top-left) -->
          <circle class="highlight-main" cx="-7" cy="-7" r="7" fill="#FFFFFF"/>
          <!-- Secondary highlight (bottom-right subtle) -->
          <circle class="highlight-sub" cx="6" cy="5" r="3.5" fill="#FFFFFF" opacity="0.5"/>
        </g>

        <!-- Eyelid overlay (slides down from above for sleepy state) -->
        <rect class="eyelid-l" x="-32" y="-60" width="64" height="60" fill="#FFF8F0" transform="translate(0, -80)"/>

        <!-- Deadpan line eye -->
        <line class="eye-line-l" x1="-22" y1="0" x2="22" y2="0" stroke="#5C4033" stroke-width="4" stroke-linecap="round" opacity="0"/>
      </g>
    </g>

    <!-- ====== RIGHT EYE ====== -->
    <g class="eye-pos-right">
      <g class="eye-right">
        <!-- Eye white -->
        <ellipse class="eye-white-r" cx="0" cy="0" rx="26" ry="28" fill="#FEFEFE"/>

        <!-- Iris + Highlights group -->
        <g class="iris-group" transform="translate(0, 2)">
          <circle class="iris" cx="0" cy="0" r="20" fill="url(#irisGrad)"/>
          <circle class="highlight-main" cx="-7" cy="-7" r="7" fill="#FFFFFF"/>
          <circle class="highlight-sub" cx="6" cy="5" r="3.5" fill="#FFFFFF" opacity="0.5"/>
        </g>

        <!-- Eyelid overlay -->
        <rect class="eyelid-r" x="-32" y="-60" width="64" height="60" fill="#FFF8F0" transform="translate(0, -80)"/>

        <!-- Deadpan line eye -->
        <line class="eye-line-r" x1="-22" y1="0" x2="22" y2="0" stroke="#5C4033" stroke-width="4" stroke-linecap="round" opacity="0"/>
      </g>
    </g>

    <!-- Closed eyes (hidden by default, shown during sleeping animation) -->
    <g class="eyes-closed" opacity="0">
      <path class="closed-eye-l" d="M 52 92 Q 62 84 72 92" fill="none" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
      <path class="closed-eye-r" d="M 128 92 Q 138 84 148 92" fill="none" stroke="#5C4033" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ==================== MOUTH ==================== -->
  <g id="mouth">
    <g class="mouth-pos">
      <!-- Happy (default smile) -->
      <path class="mouth-happy" d="M -14 0 Q 0 11 14 0" fill="none" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>

      <!-- Sad (inverted arc) -->
      <path class="mouth-sad" d="M -12 2 Q 0 -9 12 2" fill="none" stroke="#8B7355" stroke-width="3" stroke-linecap="round" opacity="0"/>

      <!-- Surprised (open oval) -->
      <ellipse class="mouth-surprised" cx="0" cy="0" rx="9" ry="11" fill="#1A1A1A" opacity="0"/>

      <!-- Sleepy (small relaxed curve) -->
      <path class="mouth-sleepy" d="M -9 0 Q 0 5 9 0" fill="none" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round" opacity="0"/>

      <!-- Tsundere (asymmetric smirk) -->
      <path class="mouth-tsundere" d="M -12 3 Q -4 -2 4 -4 L 12 -5" fill="none" stroke="#8B7355" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>

      <!-- Panic (open, smaller than surprised) -->
      <ellipse class="mouth-panic" cx="0" cy="2" rx="7" ry="9" fill="#1A1A1A" opacity="0"/>

      <!-- Deadpan (straight line) -->
      <line class="mouth-deadpan" x1="-11" y1="0" x2="11" y2="0" stroke="#8B7355" stroke-width="3" stroke-linecap="round" opacity="0"/>
    </g>
  </g>

  <!-- ==================== MOUTH TALKING GROUP ==================== -->
  <g class="mouth-talk" opacity="0">
    <path class="talk-closed" d="M -14 0 Q 0 10 14 0" fill="none" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
    <ellipse class="talk-open" cx="0" cy="0" rx="8" ry="10" fill="#1A1A1A" opacity="0"/>
  </g>

  <!-- ==================== EFFECTS (FRONT) ==================== -->
  <g id="effects-front">
    <!-- Sweat drop (for panic) -->
    <path class="sweat-drop" d="M 170 92 Q 176 98 176 103 Q 176 108 170 108 Q 164 108 164 103 Q 164 98 170 92 Z" fill="#87CEEB" opacity="0"/>

    <!-- Steam puffs (for tsundere) -->
    <g class="effect-steam" opacity="0">
      <path d="M 32 68 Q 26 58 32 48 Q 38 38 32 28" fill="none" stroke="#DDD" stroke-width="2" stroke-linecap="round"/>
      <path d="M 42 74 Q 36 64 42 54 Q 48 44 42 34" fill="none" stroke="#DDD" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>
  </g>
</svg>
