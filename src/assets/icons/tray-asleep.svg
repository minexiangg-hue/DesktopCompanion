<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Asleep tray icon: sleeping face with ZZZ -->
  <!-- Cream circular face -->
  <circle cx="8" cy="8" r="7" fill="#FFF8F0"/>
  <circle cx="8" cy="8" r="7" fill="none" stroke="#E8DDD0" stroke-width="0.5"/>

  <!-- Closed eyes (^_^ style arches) -->
  <path d="M 4 6.5 Q 5.5 5.2 7 6.5" fill="none" stroke="#5C4033" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M 9 6.5 Q 10.5 5.2 12 6.5" fill="none" stroke="#5C4033" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Relaxed mouth (small 'o' shape) -->
  <circle cx="8" cy="9.5" r="0.8" fill="none" stroke="#8B7355" stroke-width="0.7"/>

  <!-- ZZZ mark -->
  <text x="12.5" y="5" font-family="Arial, Helvetica, sans-serif" font-size="3.5" font-weight="bold" fill="#A0D8EF">Z</text>
  <text x="13.8" y="3.2" font-family="Arial, Helvetica, sans-serif" font-size="2.8" font-weight="bold" fill="#A0D8EF" opacity="0.6">Z</text>
</svg>
